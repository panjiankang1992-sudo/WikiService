version: '3.8'

services:
  lightrag:
    build:
      context: ./lightrag
      dockerfile: Dockerfile
    container_name: wiki-lightrag
    restart: always
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-deepseek-embedding}
      - STORAGE_PATH=/data/lightrag
      - PORT=8080
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - lightrag-data:/data/lightrag

volumes:
  lightrag-data:
